{% extends "base.html" %}
{% block content %}
<head>
  <meta charset="UTF-8" />
  <title>Signals + MQTT + JSON Loop</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }
    main.container {
      margin: 0;
      padding: 0;
    }
    #svg-container {
      width: 100%;
      height: calc(100vh - 56px);
      border: none;
      background-color: grey;
      overflow: hidden;
      cursor: grab;
      user-select: none;
      display: block;
    }
    #tooltip {
      position: fixed;
      background: rgba(0,0,0,0.75);
      color: #fff;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 13px;
      pointer-events: none;
      display: none;
      z-index: 10000;
      white-space: nowrap;
    }
    #context-menu {
      position: absolute;
      background: #fff;
      border: 1px solid #333;
      font-size: 30px;    /* Bigger text */
      display: none;
      z-index: 9999;
    }
    #context-menu button {
      display: block;
      width: 100%;
      padding: 5px 10px;
      border: none;
      background: none;
      text-align: left;
      font-size: inherit;
      cursor: pointer;
    }
    #context-menu button:hover:not(:disabled) {
      background: #eee;
    }
    #context-menu button:disabled {
      color: #aaa;
      cursor: default;
    }
    #context-menu hr {
      border: none;
      border-top: 1px solid #ccc;
      margin: 4px 0;
    }
    @keyframes point-flash {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.15; }
    }
    .point-flashing path {
      animation: point-flash 0.7s ease-in-out infinite;
    }
  </style>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>
<body>

<div id="svg-container">Loading SVG...</div>
<div id="context-menu"></div>
<div id="tooltip"></div>
{% endblock %}
{% block scripts %}
<script>
  const contextMenu = document.getElementById('context-menu');
  const tooltip = document.getElementById('tooltip');

  function showTooltip(e, text) {
    tooltip.textContent = text;
    tooltip.style.display = 'block';
    positionTooltip(e);
  }
  function positionTooltip(e) {
    tooltip.style.left = `${e.clientX + 14}px`;
    tooltip.style.top  = `${e.clientY - 28}px`;
  }
  function hideTooltip() {
    tooltip.style.display = 'none';
  }
  // Maps each aspect to the colours for each SVG sub-element it affects.
  // Elements not listed for an aspect are left unchanged.
  const aspectElementColors = {
    "danger":                    { "-mainAspect": "red",   "-positionLight": "black", "-associatedPositionLight": "black" },
    "caution":                   { "-mainAspect": "yellow",                           "-associatedPositionLight": "black" },
    "clear":                     { "-mainAspect": "green",                            "-associatedPositionLight": "black" },
    "position_light":            {                          "-positionLight": "white"                                     },
    "associated_position_light": {                                                     "-associatedPositionLight": "white" },
  };

  let client;
  let jsonData;

  // signal → [routeRef, ...] map, built after JSON loads
  const signalRoutes = {};
  // live availability state, updated via MQTT
  const routeAvailable = {};
  // per-point state cache
  const pointState = {};
  // per-section state cache (occstatus + routestatus)
  const sectionState = {};

  const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
  const mqttHost = window.location.hostname;
  const mqttPort = 9001; // Your Mosquitto websocket listener port
  const mqttUrl = `${protocol}://${mqttHost}:${mqttPort}`;
  console.log('Connecting to MQTT:', mqttUrl);

  Promise.all([
    fetch("static/images/WDSME Scheme_C.svg").then(res => res.text()),
    fetch('/layout-json').then(res => res.json())
  ])
  .then(([svgText, data]) => {
    jsonData = data;
    document.getElementById('svg-container').innerHTML = svgText;
    const svgEl = document.getElementById('svg-container').querySelector('svg');
    if (svgEl) { svgEl.style.transformOrigin = '0 0'; svgEl.style.display = 'block'; }

    // Build signal → routes reverse map
    Object.entries(jsonData.Routes).forEach(([routeRef, route]) => {
      routeAvailable[routeRef] = route.available;
      Object.keys(route.signals).forEach(sigRef => {
        if (!signalRoutes[sigRef]) signalRoutes[sigRef] = [];
        signalRoutes[sigRef].push(routeRef);
      });
    });

    client = mqtt.connect(mqttUrl);

    client.on('connect', () => {
      console.log('MQTT connected');
      Object.keys(jsonData.Signals).forEach(ref => {
        client.subscribe(`report/signal/${ref}/aspect`);
      });
      Object.keys(jsonData.Sections).forEach(ref => {
        client.subscribe(`report/section/${ref}/occstatus`);
        client.subscribe(`report/section/${ref}/routestatus`);
        client.subscribe(`report/section/${ref}/blocked`);
      });
      Object.keys(jsonData.Points).forEach(ref => {
        client.subscribe(`report/point/${ref}/set_direction`);
        client.subscribe(`report/point/${ref}/detection_status`);
        client.subscribe(`report/point/${ref}/detection_boolean`);
      });
      Object.keys(jsonData.Routes).forEach(ref => {
        client.subscribe(`report/route/${ref}/available`);
      });
    });

    // --- Signal aspect display ---
    function setAspect(signalNumber, aspect) {
      const elementColors = aspectElementColors[aspect];
      if (!elementColors) return;
      Object.entries(elementColors).forEach(([suffix, colour]) => {
        const sel = suffix === '-mainAspect'
          ? `g[data-cell-id="Signal-${signalNumber}${suffix}"] ellipse`
          : `g[data-cell-id="Signal-${signalNumber}${suffix}"] path`;
        const el = document.querySelector(sel);
        if (el) el.style.fill = colour;
      });
    }

    function getSectionUnoccupiedColour() {
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'white' : 'black';
    }

    // --- Section display ---
    function updateSectionDisplay(sectionRef) {
      const state = sectionState[sectionRef] || {};
      const group = document.querySelector(`g[data-cell-id="Section-${sectionRef}"]`);
      if (!group) return;
      const occ = state.occstatus || 0;
      const routeStatus = state.routestatus || 'not set';
      const blocked = !!state.blocked;
      let colour, strokeWidth;
      if (occ) {
        colour = 'red';
        strokeWidth = '4';
      } else if (blocked) {
        colour = 'magenta';
        strokeWidth = '4';
      } else if (routeStatus === 'set' || routeStatus === 'setting') {
        colour = 'blue';
        strokeWidth = '4';
      } else {
        colour = getSectionUnoccupiedColour();
        strokeWidth = '';
      }
      group.querySelectorAll('path, line, polyline').forEach(el => {
        el.style.stroke = colour;
        el.style.strokeWidth = strokeWidth;
      });
    }

    // --- Point position display ---
    function updatePointDisplay(pointRef) {
      const state = pointState[pointRef] || {};
      const normalEl  = document.querySelector(`g[data-cell-id="Points-${pointRef}-normal"]`);
      const reverseEl = document.querySelector(`g[data-cell-id="Points-${pointRef}-reverse"]`);
      if (!normalEl && !reverseEl) return;

      // Clear any existing flash animation
      [normalEl, reverseEl].filter(Boolean).forEach(el => {
        el.classList.remove('point-flashing');
        el.style.opacity = '';
      });

      const { set_direction, detection_status, detection_boolean } = state;

      if (detection_boolean) {
        // Detected: show the detected blade, dim the other
        if (normalEl)  normalEl.style.opacity  = detection_status === 'normal'  ? '1' : '0.15';
        if (reverseEl) reverseEl.style.opacity = detection_status === 'reverse' ? '1' : '0.15';
      } else if (set_direction) {
        // Setting: flash the commanded direction, dim the other
        const targetEl = set_direction === 'normal' ? normalEl : reverseEl;
        const otherEl  = set_direction === 'normal' ? reverseEl : normalEl;
        if (targetEl) targetEl.classList.add('point-flashing');
        if (otherEl)  otherEl.style.opacity = '0.15';
      } else {
        // No information: dim both
        [normalEl, reverseEl].filter(Boolean).forEach(el => el.style.opacity = '0.3');
      }
    }

    client.on('message', (topic, message) => {
      const parts = topic.split('/');
        const payload = typeof message === 'string' ? message : new TextDecoder().decode(message);

      if (parts[0] === 'report' && parts[1] === 'signal' && parts[3] === 'aspect') {
        payload.split(',').filter(Boolean).forEach(aspect => setAspect(parts[2], aspect));
      }
      else if (parts[0] === 'report' && parts[1] === 'section' && parts[3] === 'occstatus') {
        if (!sectionState[parts[2]]) sectionState[parts[2]] = {};
        sectionState[parts[2]].occstatus = parseInt(payload);
        updateSectionDisplay(parts[2]);
      }
      else if (parts[0] === 'report' && parts[1] === 'section' && parts[3] === 'routestatus') {
        if (!sectionState[parts[2]]) sectionState[parts[2]] = {};
        sectionState[parts[2]].routestatus = payload;
        updateSectionDisplay(parts[2]);
      }
      else if (parts[0] === 'report' && parts[1] === 'section' && parts[3] === 'blocked') {
        if (!sectionState[parts[2]]) sectionState[parts[2]] = {};
        sectionState[parts[2]].blocked = (payload === 'True' || payload === '1');
      }
      else if (parts[0] === 'report' && parts[1] === 'point') {
        const ref = parts[2];
        if (!pointState[ref]) pointState[ref] = {};
        if (parts[3] === 'set_direction')    pointState[ref].set_direction    = payload;
        if (parts[3] === 'detection_status') pointState[ref].detection_status = payload;
        if (parts[3] === 'detection_boolean') pointState[ref].detection_boolean = (payload === 'True');
        updatePointDisplay(ref);
      }
      else if (parts[0] === 'report' && parts[1] === 'route' && parts[3] === 'available') {
        routeAvailable[parts[2]] = (payload === 'True');
      }
    });

    // Wire up signal click handlers
    Object.entries(jsonData.Signals).forEach(([ref, signal]) => {
      const group = document.querySelector(`g[data-cell-id="${ref}"]`);
      const element = document.querySelector(`g[data-cell-id="${ref}"] g[data-cell-id*="Signal-${ref}"] path, g[data-cell-id="${ref}"] ellipse`);
      if (group) {
        if (element) element.style.fill = 'gray';
        group.classList.add('interactive-element');
        group.style.cursor = 'pointer';
        group.addEventListener('click', e => {
          e.stopPropagation();
          showContextMenu(e, ref, group);
        });
      } else {
        console.warn('No group found for signal', ref);
      }
    });

    // Wire up section click handlers
    Object.keys(jsonData.Sections).forEach(ref => {
      const group = document.querySelector(`g[data-cell-id="Section-${ref}"]`);
      if (group) {
        group.classList.add('interactive-element');
        group.style.cursor = 'pointer';
        group.addEventListener('click', e => {
          e.stopPropagation();
          showSectionContextMenu(e, ref);
        });
        group.addEventListener('mouseenter', e => {
          const occ = (sectionState[ref] && sectionState[ref].occstatus) || 0;
          showTooltip(e, `Section ${ref} — ${occ} axle${occ === 1 ? '' : 's'}`);
        });
        group.addEventListener('mousemove', positionTooltip);
        group.addEventListener('mouseleave', hideTooltip);
      }
    });

    // Wire up point click handlers (both normal and reverse blades)
    Object.keys(jsonData.Points).forEach(ref => {
      ['normal', 'reverse'].forEach(blade => {
        const group = document.querySelector(`g[data-cell-id="Points-${ref}-${blade}"]`);
        if (group) {
          group.classList.add('interactive-element');
          group.style.cursor = 'pointer';
          group.addEventListener('click', e => {
            e.stopPropagation();
            showPointContextMenu(e, ref);
          });
        }
      });
    });
  });

  function showContextMenu(e, ref, element) {
    let html = `
      <button data-aspect="danger">Danger</button>
      <button data-aspect="caution">Caution</button>
      <button data-aspect="clear">Clear</button>
      <button data-aspect="associated_position_light">Calling-on</button>
      <button data-aspect="position_light">Shunt</button>
    `;

    const routes = signalRoutes[ref] || [];
    if (routes.length) {
      html += '<hr>';
      routes.forEach(routeRef => {
        const desc = (jsonData.Routes[routeRef] && jsonData.Routes[routeRef].description) || routeRef;
        const avail = routeAvailable[routeRef];
        html += `<button data-route="${routeRef}" data-action="set" ${avail ? '' : 'disabled'}>Set: ${desc}</button>`;
      });
      html += `<button data-action="cancel-all">Cancel routes from this signal</button>`;
    }

    contextMenu.innerHTML = html;
    contextMenu.style.left = `${e.pageX}px`;
    contextMenu.style.top  = `${e.pageY}px`;
    contextMenu.style.display = 'block';

    contextMenu.querySelectorAll('button[data-aspect]').forEach(button => {
      button.onclick = () => {
        client.publish(`set/signal/${ref}/aspect`, button.dataset.aspect);
        contextMenu.style.display = 'none';
      };
    });
    contextMenu.querySelectorAll('button[data-route][data-action="set"]').forEach(button => {
      button.onclick = () => {
        client.publish(`set/route/${button.dataset.route}`, 'True');
        contextMenu.style.display = 'none';
      };
    });
    const cancelAllBtn = contextMenu.querySelector('button[data-action="cancel-all"]');
    if (cancelAllBtn) {
      cancelAllBtn.onclick = () => {
        routes.forEach(routeRef => client.publish(`set/route/${routeRef}`, 'False'));
        contextMenu.style.display = 'none';
      };
    }
  }

  function showPointContextMenu(e, ref) {
    const html = `
      <button data-point-action="normal">Normal</button>
      <button data-point-action="reverse">Reverse</button>
    `;
    contextMenu.innerHTML = html;
    contextMenu.style.left = `${e.pageX}px`;
    contextMenu.style.top  = `${e.pageY}px`;
    contextMenu.style.display = 'block';

    contextMenu.querySelectorAll('button[data-point-action]').forEach(button => {
      button.onclick = () => {
        client.publish(`set/point/${ref}`, button.dataset.pointAction);
        contextMenu.style.display = 'none';
      };
    });
  }

  function showSectionContextMenu(e, ref) {
    const isBlocked = !!(sectionState[ref] && sectionState[ref].blocked);
    const html = `
      <button data-section-action="occupy">Force occupy</button>
      <button data-section-action="unoccupy">Unoccupy</button>
      <hr>
      <button data-section-action="block">${isBlocked ? 'Unblock section' : 'Block section'}</button>
    `;
    contextMenu.innerHTML = html;
    contextMenu.style.left = `${e.pageX}px`;
    contextMenu.style.top  = `${e.pageY}px`;
    contextMenu.style.display = 'block';

    contextMenu.querySelector('button[data-section-action="occupy"]').onclick = () => {
      client.publish(`set/section/${ref}/occstatus`, '1');
      contextMenu.style.display = 'none';
    };
    contextMenu.querySelector('button[data-section-action="unoccupy"]').onclick = () => {
      contextMenu.style.display = 'none';
      if (window.confirm(`Unoccupy section ${ref}?`)) {
        client.publish(`set/section/${ref}/occstatus`, '0');
      }
    };
    contextMenu.querySelector('button[data-section-action="block"]').onclick = () => {
      client.publish(`set/section/${ref}/blocked`, isBlocked ? 'False' : 'True');
      contextMenu.style.display = 'none';
    };
  }

  window.addEventListener('click', () => {
    contextMenu.style.display = 'none';
  });

  // --- Pan and zoom ---
  const svgContainer = document.getElementById('svg-container');
  let panX = 0, panY = 0, zoom = 1;
  let isPanning = false, panStartX, panStartY, panMoved = false;

  function applyTransform() {
    const svg = svgContainer.querySelector('svg');
    if (svg) svg.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
  }

  svgContainer.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    if (e.target.closest('.interactive-element')) return;
    isPanning = true;
    panMoved = false;
    panStartX = e.clientX - panX;
    panStartY = e.clientY - panY;
    svgContainer.style.cursor = 'grabbing';
    e.preventDefault();
  });

  window.addEventListener('mousemove', e => {
    if (!isPanning) return;
    const nx = e.clientX - panStartX;
    const ny = e.clientY - panStartY;
    if (!panMoved && (Math.abs(nx - panX) > 3 || Math.abs(ny - panY) > 3)) panMoved = true;
    panX = nx;
    panY = ny;
    applyTransform();
  });

  window.addEventListener('mouseup', () => {
    if (!isPanning) return;
    isPanning = false;
    svgContainer.style.cursor = 'grab';
  });

  // Suppress child click handlers when a drag just finished
  svgContainer.addEventListener('click', e => {
    if (panMoved) { e.stopPropagation(); panMoved = false; }
  }, true);

  svgContainer.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = svgContainer.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const factor = e.deltaY < 0 ? 1.1 : 1 / 1.1;
    const newZoom = Math.max(0.1, Math.min(10, zoom * factor));
    panX = mx - (mx - panX) * (newZoom / zoom);
    panY = my - (my - panY) * (newZoom / zoom);
    zoom = newZoom;
    applyTransform();
  }, { passive: false });
</script>
</body>
</html>
{% endblock %}
